version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: streamnews
      POSTGRES_USER: streamnews
      POSTGRES_PASSWORD: streamnews123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - streamnews-network
    deploy:
      placement:
        constraints:
          - node.role == manager

  # Redis pour la queue de tâches
  redis:
    image: redis:7-alpine
    networks:
      - streamnews-network
    deploy:
      placement:
        constraints:
          - node.role == manager

  # Service d'analyse des sites web
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://streamnews:streamnews123@postgres:5432/streamnews
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - streamnews-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Service web pour l'interface utilisateur
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://streamnews:streamnews123@postgres:5432/streamnews
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - streamnews-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # Service de worker pour traiter les tâches
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://streamnews:streamnews123@postgres:5432/streamnews
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - streamnews-network
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

volumes:
  postgres_data:

networks:
  streamnews-network:
    driver: overlay 