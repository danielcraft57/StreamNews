name: Mise en ligne

# Attend la fin des Tests (pas de 2e passage e2e).
on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Seulement si Tests OK (ou lancement manuel) + ENABLE_DEPLOY
    if: >
      vars.ENABLE_DEPLOY == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')
    env:
      FLEET_HOSTS: ${{ vars.FLEET_HOSTS }}
      FLEET_USER: ${{ vars.FLEET_USER }}
    steps:
      - name: Normalize SSH host
        id: ssh
        env:
          RAW_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          H="${RAW_HOST}"
          H="${H#https://}"
          H="${H#http://}"
          H="${H#tcp://}"
          H="${H%%/*}"
          # hostname:port -> hostname (SSH utilise port 22 par defaut)
          if [[ "$H" == *:* ]]; then
            H="${H%%:*}"
          fi
          if [[ -z "$H" ]]; then
            echo "DEPLOY_HOST secret vide ou invalide"
            exit 1
          fi
          echo "host=$H" >> "$GITHUB_OUTPUT"
          echo "SSH host normalise: $H"

      - name: Deployer la flotte via node12
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ steps.ssh.outputs.host }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          envs: FLEET_HOSTS,FLEET_USER,DEPLOY_PATH,DEPLOY_PATH_EDGE
          script: |
            set -euo pipefail
            APP_EDGE="${DEPLOY_PATH_EDGE:-/opt/streamnews-edge}"
            REPO="https://github.com/danielcraft57/StreamNews.git"
            if [[ ! -d "$APP_EDGE/.git" ]]; then
              sudo mkdir -p "$(dirname "$APP_EDGE")"
              sudo git clone --branch main "$REPO" "$APP_EDGE"
              sudo chown -R "$(whoami):$(whoami)" "$APP_EDGE"
            else
              git -C "$APP_EDGE" fetch origin
              git -C "$APP_EDGE" reset --hard origin/main
            fi
            export FLEET_HOSTS="${FLEET_HOSTS:-node6.lan node7.lan node8.lan}"
            export FLEET_USER="${FLEET_USER:-pi}"
            export DEPLOY_PATH="${DEPLOY_PATH:-/opt/streamnews}"
            export DEPLOY_BRANCH=main
            bash "$APP_EDGE/deploy/deploy-fleet.sh"
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PATH_EDGE: ${{ secrets.DEPLOY_PATH_EDGE }}
