name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: streamnews
          POSTGRES_PASSWORD: streamnews123
          POSTGRES_DB: streamnews
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U streamnews -d streamnews"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://streamnews:streamnews123@localhost:5432/streamnews
    defaults:
      run:
        working-directory: analyzer
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            analyzer/requirements.txt
            analyzer/requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests
        run: pytest -q -m "not integration"
      - name: Run integration tests (Postgres)
        run: pytest -q -m integration

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: node --check server.js
      - name: Run unit tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: [python, node]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: streamnews
          POSTGRES_PASSWORD: streamnews123
          POSTGRES_DB: streamnews
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U streamnews -d streamnews"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://streamnews:streamnews123@localhost:5432/streamnews
      REDIS_URL: redis://localhost:6379/0
      WEB_URL: http://127.0.0.1:3000
      ANALYZER_URL: http://127.0.0.1:8000
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_MOCK_URL: http://127.0.0.1:8765/
      CI: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: analyzer/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            e2e/package-lock.json

      - name: Install Python deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r analyzer/requirements.txt

      - name: Install Node deps (web + e2e)
        run: |
          npm ci --prefix web
          npm install --prefix e2e

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start stack
        run: bash scripts/e2e-stack.sh

      - name: Run Playwright e2e
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
            /tmp/streamnews-e2e
          if-no-files-found: ignore
