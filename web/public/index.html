<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamNews - Analyseur de Flux RSS</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .results {
            margin-top: 20px;
        }

        .rss-feed {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .rss-feed h4 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .rss-feed a {
            color: #007bff;
            text-decoration: none;
        }

        .rss-feed a:hover {
            text-decoration: underline;
        }

        .articles-layout {
            display: grid;
            grid-template-columns: minmax(240px, 1fr) minmax(280px, 1.4fr);
            gap: 16px;
            margin-top: 12px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .articles-layout {
                grid-template-columns: 1fr;
            }
        }

        .articles-list-pane {
            max-height: 560px;
            overflow-y: auto;
        }

        .article-item {
            cursor: pointer;
            transition: border-color 0.2s ease, background-color 0.2s ease;
            display: block;
        }

        .article-item-hero {
            margin: 8px 0 10px;
            border-radius: 8px;
            overflow: hidden;
            background: #eef1f5;
        }

        .article-item-hero img {
            display: block;
            width: 100%;
            height: 110px;
            object-fit: cover;
        }

        .article-item--no-thumb .article-item-body {
            padding-left: 0;
        }

        .article-item-body h4 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-item-body {
            min-width: 0;
            flex: 1;
        }

        .article-item-body h4 {
            margin: 0 0 6px;
            font-size: 0.98rem;
            line-height: 1.35;
        }

        .article-item-body p {
            margin: 0 0 6px;
            color: #555;
            font-size: 0.88rem;
            line-height: 1.45;
        }

        .article-item-meta {
            color: #777;
            font-size: 0.78rem;
        }

        .article-item:hover {
            background: #eef1ff;
        }

        .article-item.is-selected {
            border-color: #667eea;
            background: #eef1ff;
            box-shadow: inset 3px 0 0 #667eea;
        }

        .article-enrich-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
            background: #e9ecef;
            color: #555;
        }

        .article-enrich-badge.ok { background: #d4edda; color: #155724; }
        .article-enrich-badge.pending { background: #fff3cd; color: #856404; }
        .article-enrich-badge.error { background: #f8d7da; color: #721c24; }

        .article-analysis-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 4px;
            vertical-align: middle;
            background: #e8f4f8;
            color: #0c5460;
        }

        .article-analysis-badge.ok { background: #cce5ff; color: #004085; }
        .article-analysis-badge.pending { background: #fff3cd; color: #856404; }
        .article-analysis-badge.error { background: #f8d7da; color: #721c24; }
        .article-analysis-badge.skipped { background: #e9ecef; color: #666; }

        .reader-analysis-panel {
            margin: 0;
            padding: 16px 18px;
            border-radius: 10px;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f7fa 100%);
            border: 1px solid #dce4f0;
        }

        .reader-analysis-section {
            margin: 0 0 20px;
        }

        .reader-analysis-section > .reader-section-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #5568c9;
            margin: 0 0 10px;
        }

        .reader-analysis-panel h4 {
            margin: 0 0 12px;
            font-size: 1rem;
            color: #334;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }

        .reader-analysis-head {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .reader-analysis-actions {
            margin-left: auto;
        }

        .reader-analysis-actions .btn {
            width: auto;
            padding: 4px 10px;
            font-size: 0.75rem;
            display: inline-block;
        }

        .reader-header {
            margin: 0 0 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid #eee;
        }

        .reader-header h3 {
            margin: 0 0 8px;
        }

        .reader-header .reader-meta {
            margin: 0;
        }

        .reader-header .reader-hero {
            width: 100%;
            margin: 14px 0 0;
            border-radius: 10px;
            overflow: hidden;
            background: #f0f2f5;
        }

        .reader-header .reader-hero img {
            display: block;
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            min-height: 140px;
            max-height: 380px;
            object-fit: cover;
        }

        .reader-analysis-panel.is-loading {
            color: #666;
            font-style: italic;
        }

        .reader-lang-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 4px;
            background: #667eea;
            color: #fff;
        }

        .reader-analysis-summary {
            margin: 0 0 14px;
            padding: 12px 14px;
            border-left: 3px solid #667eea;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
            line-height: 1.55;
            color: #333;
        }

        .reader-analysis-summary p {
            margin: 0 0 10px;
        }

        .reader-analysis-summary p:last-child {
            margin-bottom: 0;
        }

        .reader-analysis-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 0 0 12px;
        }

        .reader-analysis-keyword {
            background: #fff;
            border: 1px solid #c5d4e8;
            color: #334;
            font-size: 0.75rem;
            padding: 3px 9px;
            border-radius: 999px;
        }

        .reader-entities {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 0 0 8px;
        }

        .reader-entity {
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 6px;
            background: #fff;
            border: 1px solid #ddd;
            color: #444;
        }

        .reader-entity::before {
            content: attr(data-label);
            display: inline-block;
            margin-right: 5px;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.55;
        }

        .reader-entity-org { border-color: #b8daff; background: #f0f7ff; }
        .reader-entity-per { border-color: #f5c6cb; background: #fff5f5; }
        .reader-entity-loc { border-color: #c3e6cb; background: #f4fff6; }
        .reader-entity-misc { border-color: #e2e3e5; }

        .reader-analysis-meta {
            font-size: 0.75rem;
            color: #777;
            margin-top: 10px;
        }

        .reader-analysis-block {
            margin-top: 12px;
        }

        .reader-analysis-block:first-of-type {
            margin-top: 0;
        }

        .reader-analysis-block strong {
            display: block;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #667;
            margin-bottom: 6px;
        }

        .reader-analysis-empty {
            color: #666;
            font-size: 0.9rem;
            margin: 0;
        }

        .reader-article-section {
            margin-top: 0;
        }

        .reader-article-section > .reader-section-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #889;
            margin: 0 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }

        .reader-hero {
            margin: 0 0 16px;
            border-radius: 10px;
            overflow: hidden;
            background: #f0f2f5;
        }

        .reader-hero img {
            display: block;
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            max-height: 380px;
            object-fit: cover;
        }

        /* Images restantes dans le corps : pleine largeur aussi */
        .article-reader .reader-body img {
            display: block;
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            border-radius: 8px;
            margin: 12px 0;
        }

        .reader-chapo {
            font-size: 1.05rem;
            line-height: 1.55;
            color: #444;
            margin: 0 0 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid #eee;
        }

        .reader-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 0 0 14px;
        }

        .reader-keyword {
            background: #eef1ff;
            color: #445;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 999px;
        }

        .reader-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
            margin: 16px 0;
        }

        .reader-gallery img {
            width: 100%;
            height: 88px;
            object-fit: cover;
            border-radius: 6px;
            background: #f0f2f5;
        }

        .reader-meta-panel {
            margin-top: 16px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            overflow: hidden;
        }

        .reader-meta-panel summary {
            cursor: pointer;
            padding: 10px 14px;
            background: #f8f9fa;
            font-size: 0.88rem;
            color: #555;
            user-select: none;
        }

        .reader-meta-panel dl {
            margin: 0;
            padding: 12px 14px;
            font-size: 0.82rem;
        }

        .reader-meta-panel dt {
            color: #777;
            margin-top: 8px;
        }

        .reader-meta-panel dt:first-child {
            margin-top: 0;
        }

        .reader-meta-panel dd {
            margin: 2px 0 0;
            color: #333;
            word-break: break-word;
        }

        .reader-badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .reader-type-badge {
            display: inline-block;
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: #e9ecef;
            color: #444;
        }

        .article-reader {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            max-height: 560px;
            overflow-y: auto;
            position: sticky;
            top: 12px;
        }

        .article-reader.empty {
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .article-reader h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.35rem;
            line-height: 1.3;
        }

        .article-reader .reader-meta {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 14px;
        }

        .article-reader .reader-images {
            display: none;
        }

        .article-reader .reader-body {
            line-height: 1.65;
            color: #222;
            font-size: 0.98rem;
        }

        .article-reader .reader-body p {
            margin-bottom: 0.9em;
        }

        .article-reader .reader-actions {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .sites-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .site-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .site-item:hover {
            background: #e9ecef;
        }

        .site-item h4 {
            color: #667eea;
            margin-bottom: 5px;
            word-break: break-all;
            flex: 1;
        }

        .site-item-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .site-item-header h4 {
            margin-bottom: 0;
            font-size: 1rem;
        }

        .site-title-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            min-width: 0;
            flex: 1;
        }

        .site-title-block {
            min-width: 0;
        }

        .site-favicon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            flex-shrink: 0;
            margin-top: 2px;
            object-fit: contain;
            background: #f0f0f0;
        }

        .site-favicon-lg {
            width: 32px;
            height: 32px;
        }

        .site-favicon-fallback {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: #ddd;
        }

        .site-url {
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }

        .site-desc {
            font-size: 13px;
            color: #444;
            margin: 6px 0 8px;
            line-height: 1.35;
        }

        .btn-delete {
            flex-shrink: 0;
            border: 1px solid #c0392b;
            background: #fff;
            color: #c0392b;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-delete:hover {
            background: #c0392b;
            color: #fff;
        }

        .site-item .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .site-item .status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .site-item .status.analyzing {
            background: #d1ecf1;
            color: #0c5460;
        }

        .site-item .status.completed {
            background: #d4edda;
            color: #155724;
        }

        .site-item .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .site-item .status.cancelled {
            background: #e2e3e5;
            color: #383d41;
        }

        .btn-stop {
            margin-top: 14px;
            border: 1px solid #c0392b;
            background: #fff;
            color: #c0392b;
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-stop:hover {
            background: #c0392b;
            color: #fff;
        }

        .btn-stop:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-rss"></i> StreamNews</h1>
            <p>Analyseur intelligent de flux RSS</p>
        </div>

        <div class="main-content">
            <!-- Formulaire d'analyse -->
            <div class="card">
                <h2><i class="fas fa-search"></i> Analyser un site</h2>
                
                <div id="status" class="status" data-testid="status"></div>
                
                <form id="analyzeForm" data-testid="analyze-form">
                    <div class="form-group">
                        <label for="url">URL du site à analyser</label>
                        <input type="url" id="url" name="url" data-testid="url-input" placeholder="https://example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="maxPages">Maximum de pages (plafond)</label>
                        <select id="maxPages" name="maxPages" data-testid="max-pages">
                            <option value="25">25 pages max</option>
                            <option value="50" selected>50 pages max</option>
                            <option value="100">100 pages max</option>
                            <option value="200">200 pages max</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="depth">Profondeur de crawl</label>
                        <select id="depth" name="depth" data-testid="depth">
                            <option value="2">2 niveaux</option>
                            <option value="3" selected>3 niveaux</option>
                            <option value="4">4 niveaux</option>
                            <option value="5">5 niveaux</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn" id="analyzeBtn" data-testid="analyze-btn">
                        <i class="fas fa-play"></i> Lancer l'analyse
                    </button>
                </form>
                
                <div id="loading" class="loading" style="display: none;" data-testid="loading">
                    <div class="spinner"></div>
                    <p>Analyse en cours...</p>
                    <button type="button" class="btn-stop" id="stopAnalyzeBtn" data-testid="stop-analyze-btn">
                        Arrêter l'analyse
                    </button>
                </div>
            </div>

            <!-- Liste des sites analysés -->
            <div class="card">
                <h2><i class="fas fa-list"></i> Sites analysés</h2>
                
                <div id="sitesList" class="sites-list" data-testid="sites-list">
                    <p>Chargement des sites...</p>
                </div>
            </div>
        </div>

        <!-- Résultats détaillés -->
        <div class="card" id="resultsCard" style="display: none;" data-testid="results-card">
            <h2><i class="fas fa-chart-bar"></i> Résultats de l'analyse</h2>
            <div id="results" data-testid="results"></div>
        </div>
    </div>

    <script src="app.js?v=20260720a"></script>
</body>
</html>
