<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamNews - Analyseur de Flux RSS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .results {
            margin-top: 20px;
        }

        .rss-feed {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .rss-feed h4 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .rss-feed a {
            color: #007bff;
            text-decoration: none;
        }

        .rss-feed a:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .sites-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .site-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .site-item:hover {
            background: #e9ecef;
        }

        .site-item h4 {
            color: #667eea;
            margin-bottom: 5px;
        }

        .site-item .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .site-item .status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .site-item .status.analyzing {
            background: #d1ecf1;
            color: #0c5460;
        }

        .site-item .status.completed {
            background: #d4edda;
            color: #155724;
        }

        .site-item .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-rss"></i> StreamNews</h1>
            <p>Analyseur intelligent de flux RSS</p>
        </div>

        <div class="main-content">
            <!-- Formulaire d'analyse -->
            <div class="card">
                <h2><i class="fas fa-search"></i> Analyser un site</h2>
                
                <div id="status" class="status"></div>
                
                <form id="analyzeForm">
                    <div class="form-group">
                        <label for="url">URL du site à analyser</label>
                        <input type="url" id="url" name="url" placeholder="https://example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="maxPages">Nombre maximum de pages</label>
                        <select id="maxPages" name="maxPages">
                            <option value="25">25 pages</option>
                            <option value="50" selected>50 pages</option>
                            <option value="100">100 pages</option>
                            <option value="200">200 pages</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="depth">Profondeur de crawl</label>
                        <select id="depth" name="depth">
                            <option value="2">2 niveaux</option>
                            <option value="3" selected>3 niveaux</option>
                            <option value="4">4 niveaux</option>
                            <option value="5">5 niveaux</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn" id="analyzeBtn">
                        <i class="fas fa-play"></i> Lancer l'analyse
                    </button>
                </form>
                
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Analyse en cours...</p>
                </div>
            </div>

            <!-- Liste des sites analysés -->
            <div class="card">
                <h2><i class="fas fa-list"></i> Sites analysés</h2>
                
                <div id="sitesList" class="sites-list">
                    <p>Chargement des sites...</p>
                </div>
            </div>
        </div>

        <!-- Résultats détaillés -->
        <div class="card" id="resultsCard" style="display: none;">
            <h2><i class="fas fa-chart-bar"></i> Résultats de l'analyse</h2>
            <div id="results"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
